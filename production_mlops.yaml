# Training + MLflow for the production 3-feature model (10-minute ping windows).
# Run: uv run tracedata-mlops production
#   or: uv run python -m src.mlops.production_window_training
#
# Env overrides (optional):
#   MLFLOW_TRACKING_URI — full URI (sqlite, file, http). If unset, see mlflow_settings.
#   MLFLOW_ROOT — folder for default sqlite DB (default: <project>/mlflow/mlflow.db)
#   MLFLOW_ARTIFACT_ROOT — where run artifacts go (default: <MLFLOW_ROOT>/artifacts)
#   MLFLOW_EXPERIMENT_PRODUCTION — overrides experiment_name below
#
# tracking_uri: auto → SQLite under MLFLOW_ROOT + artifacts in MLFLOW_ARTIFACT_ROOT.
# To use the old file store instead: set tracking_uri to ./mlruns (and no sqlite).

mlflow:
  tracking_uri: auto
  experiment_name: smoothness-10min-production

training:
  n_samples: 2500
  test_size: 0.2
  random_seed: 42
  window_minutes: 10
  background_rows: 96
  model_output_path: models/smoothness_model.joblib

registry:
  register: false
  model_name: smoothness_10min_xgb

model:
  xgboost:
    n_estimators: 120
    learning_rate: 0.08
    max_depth: 5
    random_state: 42
    objective: reg:squarederror
  quality_gate:
    min_r2_score: 0.75

output:
  reports_dir: reports
