# Training + MLflow for the production 3-feature model (10-minute ping windows).
# Run: uv run tracedata-mlops production
#   or: uv run python -m src.mlops.production_window_training
#
# Env overrides (optional):
#   MLFLOW_TRACKING_URI — full URI (file, sqlite, http). If unset, this config uses ./mlruns.
#   MLFLOW_EXPERIMENT_PRODUCTION — overrides experiment_name below.

mlflow:
  tracking_uri: ./mlruns
  experiment_name: smoothness-10min-production
  # MLflow UI → experiment → Traces tab (nested spans for data gen, fit, eval).
  enable_tracing: true

training:
  n_samples: 2500
  test_size: 0.2
  random_seed: 42
  window_minutes: 10
  background_rows: 96
  model_output_path: models/smoothness_model.joblib

registry:
  register: false
  model_name: smoothness_10min_xgb

model:
  xgboost:
    n_estimators: 120
    learning_rate: 0.08
    max_depth: 5
    random_state: 42
    objective: reg:squarederror
  quality_gate:
    min_r2_score: 0.75

output:
  reports_dir: reports
