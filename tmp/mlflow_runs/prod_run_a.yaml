mlflow:
  tracking_uri: auto
  experiment_name: smoothness-10min-production

training:
  n_samples: 1800
  test_size: 0.2
  random_seed: 11
  window_minutes: 10
  background_rows: 64
  model_output_path: models/smoothness_model_run_a.joblib

registry:
  register: false
  model_name: smoothness_10min_xgb

model:
  xgboost:
    n_estimators: 100
    learning_rate: 0.06
    max_depth: 4
    random_state: 11
    objective: reg:squarederror
  quality_gate:
    min_r2_score: 0.75

output:
  reports_dir: reports
