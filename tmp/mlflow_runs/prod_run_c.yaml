mlflow:
  tracking_uri: auto
  experiment_name: smoothness-10min-production

training:
  n_samples: 3200
  test_size: 0.2
  random_seed: 33
  window_minutes: 10
  background_rows: 128
  model_output_path: models/smoothness_model_run_c.joblib

registry:
  register: false
  model_name: smoothness_10min_xgb

model:
  xgboost:
    n_estimators: 180
    learning_rate: 0.05
    max_depth: 6
    random_state: 33
    objective: reg:squarederror
  quality_gate:
    min_r2_score: 0.75

output:
  reports_dir: reports
