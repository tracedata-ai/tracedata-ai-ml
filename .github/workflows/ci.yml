# CI for tracedata-ai-ml: small ML package (MLflow for experiments; no Docker / model registry in CI).
name: "CI — lint, test, security"

on:
  push:
    branches:
      - main
      - "feature/**"
      - "hotfix/**"
      - "integration/**"
      - "experiment/**"
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  UV_PYTHON: "3.11"
  # Monorepo root (no backend/ subfolder)
  WORKING_DIR: .

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (dev)
        run: uv sync --frozen --extra dev

      - name: Check lockfile sync
        run: uv lock --check

      - name: Black (format check)
        run: uv run black --check src tests

      - name: Ruff (lint)
        continue-on-error: true
        run: uv run ruff check src tests

      - name: Bandit (SAST)
        run: uv run bandit -c pyproject.toml -r src -ll -q

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --frozen --extra dev

      - name: Mypy
        run: uv run mypy src --ignore-missing-imports --no-error-summary

  unit-test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --frozen --extra dev

      - name: Pytest (exclude integration)
        run: |
          uv run pytest \
            -v \
            -m "not integration" \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=0 \
            --junitxml=pytest-junit.xml \
            tests/

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

      - name: Upload JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-pytest
          path: pytest-junit.xml
          retention-days: 7

  security-sca:
    name: SCA (pip-audit)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: pip-audit
        run: uvx pip-audit --requirement <(uv export --format requirements-txt --no-dev --no-emit-project)

  build:
    name: Build check
    runs-on: ubuntu-latest
    needs: [lint, unit-test, security-sca]
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --frozen --extra dev

      - name: Compileall
        run: uv run python -m compileall -q src

      - name: Build wheel (smoke)
        run: uv build

  summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit-test, security-sca, build]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download JUnit
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: junit-pytest
          path: ci-junit

      - name: Write summary
        run: |
          echo "## tracedata-ai-ml CI" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint | ${{ needs.lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Type check | ${{ needs.type-check.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests | ${{ needs.unit-test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| pip-audit | ${{ needs.security-sca.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          python3 .github/scripts/ci_junit_summary.py \
            "Pytest:ci-junit/pytest-junit.xml" \
            >> "$GITHUB_STEP_SUMMARY" || true
          echo "**Ref:** \`${{ github.ref_name }}\` **SHA:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"

  notify-slack:
    name: Slack notification
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit-test, security-sca, build, summary]
    if: always()
    steps:
      - name: Post to Slack
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_CI_WEBHOOK_URL }}
          LINT_RESULT: ${{ needs.lint.result }}
          TYPE_RESULT: ${{ needs.type-check.result }}
          TEST_RESULT: ${{ needs.unit-test.result }}
          SCA_RESULT: ${{ needs.security-sca.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          EVENT: ${{ github.event_name }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "SLACK_CI_WEBHOOK_URL not set; skipping."
            exit 0
          fi
          STATUS="PASS"
          for r in "$LINT_RESULT" "$TYPE_RESULT" "$TEST_RESULT" "$SCA_RESULT" "$BUILD_RESULT"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              STATUS="FAIL"
              break
            fi
          done
          RUN_URL="$SERVER_URL/$REPO/actions/runs/$RUN_ID"
          MSG="tracedata-ai-ml CI: $STATUS | $REPO | $BRANCH | $EVENT | $RUN_URL"
          curl -sS -X POST -H "Content-type: application/json" --data "{\"text\":\"$MSG\"}" "$SLACK_WEBHOOK"
