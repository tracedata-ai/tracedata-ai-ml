# CI for tracedata-ai-ml: small ML package (MLflow for experiments; no Docker / model registry in CI).
name: "CI - basic checks"

on:
  push:
    branches:
      - main
      - "feature/**"
      - "hotfix/**"
      - "integration/**"
      - "experiment/**"
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  UV_PYTHON: "3.11"
  # Monorepo root (no backend/ subfolder)
  WORKING_DIR: .

jobs:
  ci:
    name: Basic CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (dev)
        run: uv sync --frozen --extra dev

      - name: Check lockfile sync
        run: uv lock --check

      - name: Black (format check)
        run: uv run black --check src tests

      - name: Ruff (lint)
        run: uv run ruff check src tests

      - name: Pytest (exclude integration)
        run: |
          uv run pytest \
            -v \
            -m "not integration" \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=0 \
            --junitxml=pytest-junit.xml \
            tests/
